<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kuis Pilihan Ganda</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    button {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 220px;
      cursor: pointer;
    }

    #quiz-container {
      display: none;
    }
  </style>
</head>
<body>

  <h1>Kuis Pilihan Ganda</h1>

  <!-- MENU PILIH KUIS -->
  <div id="menu">
    <select id="quizSelect">
      <option value="matematika">Matematika</option>
      <option value="sejarah">Sejarah</option>
    </select>
    <button onclick="startQuiz()">Mulai</button>
  </div>

  <!-- KUIS -->
  <div id="quiz-container">
    <h2 id="question"></h2>
    <div id="options"></div>
    <button onclick="nextQuestion()">Next</button>
  </div>

  <!-- HASIL -->
  <div id="result" style="display:none;"></div>

  <script>
    // JSON disimpan langsung di sini
    const quizData = {
      matematika: [
        {
          question: "2 + 2 = ?",
          options: ["3", "4", "5", "6"],
          answer: 1
        },
        {
          question: "10 - 5 = ?",
          options: ["2", "3", "5", "8"],
          answer: 2
        }
      ],
      sejarah: [
        {
          question: "Siapa proklamator Indonesia?",
          options: ["Soeharto", "Jokowi", "Soekarno", "Habibie"],
          answer: 2
        }
      ]
    };

    let questions = [];
    let currentIndex = 0;
    let score = 0;

    function startQuiz() {
      const selected = document.getElementById("quizSelect").value;
      questions = quizData[selected];

      document.getElementById("menu").style.display = "none";
      document.getElementById("quiz-container").style.display = "block";

      currentIndex = 0;
      score = 0;

      showQuestion();
    }

    function showQuestion() {
      const q = questions[currentIndex];
      document.getElementById("question").innerText = q.question;

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.innerText = String.fromCharCode(65 + i) + ". " + opt;
        btn.onclick = () => checkAnswer(i);
        optionsDiv.appendChild(btn);
      });
    }

    function checkAnswer(selected) {
      if (selected === questions[currentIndex].answer) {
        score++;
      }
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById("quiz-container").style.display = "none";
      const resultDiv = document.getElementById("result");
      resultDiv.style.display = "block";
      resultDiv.innerHTML = `<h2>Skor: ${score} / ${questions.length}</h2>
                             <button onclick="location.reload()">Ulangi</button>`;
    }
  </script>

</body>
</html>

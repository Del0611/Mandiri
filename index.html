<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Jaringan Komputer SMK</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .quiz-card {
            background: var(--card);
            width: 100%;
            max-width: 700px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .header {
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 20px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--primary); }
        
        #progress { font-weight: 600; color: var(--secondary); font-size: 0.9rem; }

        .question-area h2 {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .option-btn.correct {
            background-color: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
        }

        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }

        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .control-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .control-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .hide { display: none; }

        #result-screen { text-align: center; }
        .score-circle {
            width: 120px;
            height: 120px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            font-size: 2rem;
            font-weight: bold;
        }
        
        .score-label { font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="quiz-card">
        <div id="quiz-screen">
            <div class="header">
                <h1>Kuis Jaringan</h1>
                <div id="progress">Soal 1/40</div>
            </div>

            <div class="question-area">
                <h2 id="question-text">Memuat pertanyaan...</h2>
                <div id="options-container" class="options-grid"></div>
            </div>

            <div class="footer">
                <button id="next-btn" class="control-btn" disabled>Soal Berikutnya</button>
            </div>
        </div>

        <div id="result-screen" class="hide">
            <h1>Kuis Selesai!</h1>
            <div class="score-circle">
                <span id="final-score">0</span>
                <span class="score-label">Skor</span>
            </div>
            <p id="result-message"></p>
            <button onclick="location.reload()" class="control-btn" style="background: var(--secondary)">Coba Lagi</button>
        </div>
    </div>

    <script>
        const quizData = [
            { q: "Topologi jaringan yang menghubungkan setiap perangkat ke satu perangkat pusat seperti Switch atau Hub disebut...", a: ["Topologi Bus", "Topologi Ring", "Topologi Star", "Topologi Mesh"], c: 2 },
            { q: "Apa yang menjadi kelemahan utama dari Topologi Star?", a: ["Jika satu kabel client putus, seluruh jaringan mati", "Membutuhkan terminator", "Sangat sulit menambah perangkat baru", "Jika perangkat pusat rusak, seluruh jaringan lumpuh"], c: 3 },
            { q: "Karakteristik utama dari Topologi Mesh (Full Mesh) adalah...", a: ["Setiap perangkat terhubung langsung ke semua perangkat lainnya", "Menggunakan satu kabel tunggal", "Data mengalir satu arah saja", "Memerlukan switch pusat"], c: 0 },
            { q: "Dalam model hierarki jaringan 3 lapis, lapisan yang berfungsi sebagai tulang punggung (backbone) adalah...", a: ["Access Layer", "Core Layer", "Distribution Layer", "Network Layer"], c: 1 },
            { q: "Topologi gabungan Star dan Bus yang sering digunakan di gedung bertingkat adalah...", a: ["Topologi Mesh", "Topologi Ring", "Topologi Tree", "Topologi Hybrid"], c: 2 },
            { q: "Apa fungsi dari 'Terminator' pada Topologi Bus?", a: ["Memperkuat sinyal", "Menyerap sinyal agar tidak memantul", "Menghubungkan komputer secara serial", "Membagi IP otomatis"], c: 1 },
            { q: "Di lapisan manakah pada model Cisco teknisi menerapkan ACL dan routing antar-VLAN?", a: ["Core Layer", "Access Layer", "Physical Layer", "Distribution Layer"], c: 3 },
            { q: "Diagram yang menunjukkan alamat IP, nama host, dan VLAN disebut...", a: ["Diagram Fisik", "Diagram Alir", "Diagram Logis", "Denah Lokasi"], c: 2 },
            { q: "Keunggulan utama dari Topologi Mesh adalah...", a: ["Biaya murah", "Instalasi mudah", "Redundansi/jalur cadangan tinggi", "Tidak butuh switch"], c: 2 },
            { q: "Manakah informasi yang terdapat dalam Diagram Fisik?", a: ["Rentang IP", "Lokasi geografis dan letak rak server", "Protokol routing", "Nomor port VLAN"], c: 1 },
            { q: "Mengapa perlu memulai pekerjaan dengan skenario bisnis atau analisis kebutuhan?", a: ["Agar biaya mahal", "Menentukan spesifikasi dan bandwidth yang tepat", "Aturan internasional", "Agar topologi rumit"], c: 1 },
            { q: "Jenis kabel untuk menghubungkan PC ke Switch adalah...", a: ["Fiber Optic", "Copper Cross-Over", "Copper Straight-Through", "Kabel Coaxial"], c: 2 },
            { q: "Apa fungsi utama Router dalam LAN dengan beberapa subnet?", a: ["Menghubungkan sesama PC satu divisi", "Penyimpan data", "Gateway menuju jaringan berbeda", "Memperkuat Wi-Fi"], c: 2 },
            { q: "Jika Divisi Admin memiliki 10 host, Subnet Mask paling efisien adalah...", a: ["/24", "/28", "/27", "/30"], c: 1 },
            { q: "Subnet mask /27 menyediakan jumlah usable IP sebanyak...", a: ["14 IP", "30 IP", "62 IP", "254 IP"], c: 1 },
            { q: "Perintah Cisco untuk masuk ke Mode Privileged adalah...", a: ["configure terminal", "interface g0/0", "enable", "hostname"], c: 2 },
            { q: "Apa fungsi perintah 'configure terminal'?", a: ["Simpan konfigurasi", "Masuk mode konfigurasi global", "Matikan router", "Lihat daftar IP"], c: 1 },
            { q: "Perintah untuk memberikan identitas nama pada router adalah...", a: ["name-router", "identity", "hostname", "set-name"], c: 2 },
            { q: "Mengapa perintah 'no shutdown' sangat penting?", a: ["Default port router mati", "Agar tidak overheat", "Hapus IP salah", "Dapat IP otomatis"], c: 0 },
            { q: "Apa yang dimaksud dengan 'Default Gateway' di PC?", a: ["IP teman sedivisi", "IP Router untuk akses keluar jaringan", "Alamat website", "MAC Address"], c: 1 },
            { q: "Dampak jika PC tidak mengisi Default Gateway?", a: ["PC tidak menyala", "Tidak bisa ke switch", "Hanya bisa komunikasi di satu subnet yang sama", "Langsung ke internet"], c: 2 },
            { q: "Hasil pengujian 'Reply from...' menunjukkan...", a: ["Kabel putus", "Koneksi berhasil", "Router gangguan", "IP tidak terdaftar"], c: 1 },
            { q: "Hasil ping 'Request Timed Out (RTO)' biasanya karena...", a: ["Salah konfigurasi IP/Gateway atau perangkat mati", "Jaringan terlalu cepat", "Tidak ada tabel routing", "Kabel salah"], c: 0 },
            { q: "Pesan 'Destination Host Unreachable' berarti...", a: ["Switch mati", "Router tidak tahu jalur ke tujuan", "PC sedang sibuk", "Kabel power lepas"], c: 1 },
            { q: "Fitur Packet Tracer untuk melihat pergerakan paket secara visual?", a: ["Realtime Mode", "Design Mode", "Simulation Mode", "Physical Mode"], c: 2 },
            { q: "Mengapa /24 untuk 10 host dianggap tidak efisien?", a: ["Membuang banyak IP", "Koneksi lambat", "Kabel tidak kuat", "Router rusak"], c: 0 },
            { q: "Urutan benar konfigurasi IP interface Router?", a: ["enable > interface > no shut > ip add", "enable > conf t > interface > ip add > no shut", "ip add > no shut > enable", "interface > enable"], c: 1 },
            { q: "Fungsi simbol amplop (PDU) pada Simulation Mode?", a: ["Hapus konfigurasi", "Uji kirim paket data", "Ganti nama PC", "Cetak laporan"], c: 1 },
            { q: "Lampu port Router berwarna merah menandakan...", a: ["Aktif", "Mati atau belum 'no shutdown'", "Collision", "Fiber Optic"], c: 1 },
            { q: "Teknologi menghemat switch untuk membagi divisi?", a: ["VPN", "VLAN", "VNN", "V-Router"], c: 1 },
            { q: "Komponen yang termasuk 'End Device'?", a: ["Router", "Switch", "Laptop/PC", "Access Point"], c: 2 },
            { q: "Apa itu 'Subnetting'?", a: ["Gabung router", "Membagi jaringan besar jadi kecil", "Percepat LAN", "Sembunyikan IP"], c: 1 },
            { q: "Kabel biru di Packet Tracer untuk konfigurasi awal?", a: ["Straight", "Cross", "Console", "Fiber"], c: 2 },
            { q: "Apa arti 'IPv4 Address'?", a: ["Nama pengguna", "Alamat logis unik", "Kode pabrik", "Kecepatan data"], c: 1 },
            { q: "Interface router untuk LAN kecepatan tinggi?", a: ["Serial", "Console", "GigabitEthernet", "Auxiliary"], c: 2 },
            { q: "Mengapa setiap divisi sebaiknya beda subnet?", a: ["Agar kabel tak tertukar", "Keamanan dan manajemen trafik", "Router tak baca IP sama", "Biaya murah"], c: 1 },
            { q: "Simbol '>' pada CLI Cisco menunjukkan...", a: ["User EXEC Mode", "Privileged EXEC Mode", "Global Config Mode", "Interface Mode"], c: 0 },
            { q: "Ping gagal padahal IP benar, apa yang diperiksa?", a: ["Ganti kabel", "Default Gateway PC", "Hapus PC", "Hostname"], c: 1 },
            { q: "Penulisan IP valid untuk /28?", a: ["192.168.1.1", "192.168.1.256", "192.168.1.300", "192.168.1.1.1"], c: 0 },
            { q: "Manfaat utama Simulation Mode?", a: ["Internet stabil", "Lihat detail langkah paket data", "Tak perlu config IP", "Alat tak pernah error"], c: 1 }
        ];

        let currentIdx = 0;
        let score = 0;

        const qText = document.getElementById('question-text');
        const optionsCont = document.getElementById('options-container');
        const progress = document.getElementById('progress');
        const nextBtn = document.getElementById('next-btn');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');

        function loadQuestion() {
            const data = quizData[currentIdx];
            qText.innerText = data.q;
            progress.innerText = `Soal ${currentIdx + 1}/${quizData.length}`;
            optionsCont.innerHTML = '';
            nextBtn.disabled = true;

            data.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = String.fromCharCode(65 + i) + ". " + opt;
                btn.onclick = () => selectOption(btn, i);
                optionsCont.appendChild(btn);
            });
        }

        function selectOption(btn, index) {
            const correctIdx = quizData[currentIdx].c;
            const allBtns = document.querySelectorAll('.option-btn');
            
            if (index === correctIdx) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                allBtns[correctIdx].classList.add('correct');
            }

            allBtns.forEach(b => b.disabled = true);
            nextBtn.disabled = false;
            
            if (currentIdx === quizData.length - 1) {
                nextBtn.innerText = "Lihat Hasil";
            }
        }

        nextBtn.onclick = () => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizScreen.classList.add('hide');
            resultScreen.classList.remove('hide');
            document.getElementById('final-score').innerText = score;
            
            const msg = score >= 30 ? "Luar biasa! Kamu sudah siap untuk UKK!" : "Semangat! Pelajari lagi materi konfigurasinya.";
            document.getElementById('result-message').innerText = msg;
        }

        loadQuestion();
    </script>
</body>
</html>

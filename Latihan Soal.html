<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kuis TKJ</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #2a2a40);
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* CONTAINER */
#menu, #quiz-container, #result {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 25px;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  text-align: center;
}

/* TEXT */
h1 { margin-bottom: 15px; }
h2 { margin-bottom: 10px; }

/* SELECT */
select {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}

/* OPTIONS */
#options button {
  background: rgba(255,255,255,0.1);
}

#quiz-container { display: none; }
#result { display: none; }

#progress {
  font-size: 14px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>Kuis TKJ</h1>
  <select id="quizSelect">
    <option value="tkj">Dasar TKJ</option>
  </select>
  <button onclick="startQuiz()">Mulai</button>
</div>

<!-- QUIZ -->
<div id="quiz-container">
  <p id="progress"></p>
  <h2 id="question"></h2>
  <div id="options"></div>
  <button onclick="nextQuestion()">Next</button>
</div>

<!-- RESULT -->
<div id="result"></div>

<script>
const quizData = {
  tkj: [
    {question:"Apa kepanjangan dari LAN?",options:["Local Area Network","Large Area Network","Long Area Network","Limited Area Network"],answer:0},
    {question:"Perangkat penghubung jaringan?",options:["Router","CPU","RAM","Monitor"],answer:0},
    {question:"Alamat unik perangkat?",options:["IP Address","DNS","Gateway","Subnet"],answer:0},
    {question:"Topologi bintang?",options:["Ring","Bus","Star","Mesh"],answer:2},
    {question:"Kabel umum?",options:["Fiber","UTP","Koaksial","STP"],answer:1}
  ]
};

let questions = [];
let currentIndex = 0;
let score = 0;

// START
function startQuiz() {
  questions = quizData["tkj"];
  document.getElementById("menu").style.display = "none";
  document.getElementById("quiz-container").style.display = "block";

  currentIndex = 0;
  score = 0;

  showQuestion();
}

// SHOW
function showQuestion() {
  const q = questions[currentIndex];

  document.getElementById("question").innerText = q.question;
  document.getElementById("progress").innerText =
    `Soal ${currentIndex + 1} / ${questions.length}`;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.innerText = String.fromCharCode(65 + i) + ". " + opt;

    btn.onclick = () => {
      if (i === q.answer) {
        btn.style.background = "#00ff88";
        score++;
      } else {
        btn.style.background = "#ff4d4d";
      }
      disableOptions();
    };

    optionsDiv.appendChild(btn);
  });
}

// DISABLE BUTTON
function disableOptions() {
  const buttons = document.querySelectorAll("#options button");
  buttons.forEach(btn => btn.disabled = true);
}

// NEXT
function nextQuestion() {
  currentIndex++;
  if (currentIndex < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

// RESULT
function showResult() {
  document.getElementById("quiz-container").style.display = "none";

  const resultDiv = document.getElementById("result");
  resultDiv.style.display = "block";

  resultDiv.innerHTML = `
    <h2>Skor: ${score} / ${questions.length}</h2>
    <button onclick="location.reload()">Ulangi</button>
  `;
}
</script>

</body>
</html>
